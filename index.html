<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Code Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <!-- タブバー -->
        <div id="tabs-container">
            <div id="tabs"></div>
            <button id="btn-new-tab" class="icon-btn"><i class="fas fa-plus"></i></button>
        </div>

        <!-- エディタ本体 -->
        <div id="editor-container"></div>

        <!-- 下部ツールバー -->
        <div id="toolbar">
            <button id="btn-open" class="tool-btn"><i class="fas fa-folder-open"></i> 開く</button>
            <button id="btn-save" class="tool-btn"><i class="fas fa-save"></i> 保存</button>
            <div class="separator"></div>
            
            <button id="btn-search" class="tool-btn"><i class="fas fa-search"></i> 検索・置換</button>
            <button id="btn-rename" class="tool-btn"><i class="fas fa-pen"></i> 名前変更</button>
            <button id="btn-save-as" class="tool-btn"><i class="fas fa-file-download"></i> DL保存</button>
        </div>
    </div>

    <input type="file" id="file-input" style="display: none;" multiple>
    <div id="toast" class="toast">処理が完了しました</div>

    <!-- type="module" が必須です -->
    <script type="module" src="app.js"></script>
</body>
</html>
