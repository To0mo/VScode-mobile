<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- モバイル最適化・フルスクリーン設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e1e1e">
    
    <!-- 外部ファイルなしでホーム画面追加時に全画面になる魔法のData URIマニフェスト -->
    <link rel="manifest" href='data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Mobile%20Code%20Pro%22%2C%22short_name%22%3A%22CodePro%22%2C%22display%22%3A%22standalone%22%2C%22start_url%22%3A%22.%22%2C%22background_color%22%3A%22%231e1e1e%22%2C%22theme_color%22%3A%22%231e1e1e%22%7D'>
    
    <title>Mobile Code Pro</title>

    <!-- アイコンとエディタのコアCSS (確実なCDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.css">

    <style>
        /* ==========================================
           デザイン・レイアウト (超軽量CSS)
           ========================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: #272822; color: #f8f8f2; font-family: sans-serif; overflow: hidden; overscroll-behavior-y: none; }
        
        #app-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

        /* タブ */
        #tabs-container { display: flex; background: #1e1e1e; height: 40px; align-items: center; overflow-x: auto; scrollbar-width: none; }
        #tabs-container::-webkit-scrollbar { display: none; }
        #tabs { display: flex; height: 100%; }
        .tab { padding: 0 15px; height: 100%; display: flex; align-items: center; background: #2d2d2d; border-right: 1px solid #1e1e1e; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .tab.active { background: #272822; color: #a6e22e; border-top: 2px solid #a6e22e; }
        .tab-close { margin-left: 10px; font-size: 12px; color: #999; padding: 5px; }
        .icon-btn { background: none; border: none; color: white; padding: 0 15px; height: 100%; cursor: pointer; }

        /* エディタ ＆ ミニマップ領域 */
        #main-area { display: flex; flex: 1; overflow: hidden; position: relative; width: 100%; }
        
        #editor-wrapper { flex: 1; height: 100%; overflow: hidden; }
        .CodeMirror { height: 100%; font-family: 'SF Mono', Consolas, monospace; font-size: 14px; }
        
        /* 検索ダイアログのモバイル最適化 */
        .CodeMirror-dialog { background: rgba(30, 30, 30, 0.95) !important; color: white !important; padding: 10px !important; border-radius: 0 0 8px 8px; }
        .CodeMirror-dialog input { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }

        /* ドラッグ爆速ミニマップ */
        #minimap-track {
            width: 45px; background: #1e1e1e; border-left: 1px solid #333;
            position: relative; overflow: hidden; touch-action: none; cursor: pointer;
        }
        #minimap-canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #minimap-slider {
            position: absolute; width: 100%; background: rgba(255, 255, 255, 0.15);
            top: 0; left: 0; pointer-events: none; border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 2px;
        }

        /* 下部ツールバー */
        #toolbar {
            height: 55px; background: #1e1e1e; display: flex; align-items: center; padding: 0 5px; overflow-x: auto; gap: 4px; border-top: 1px solid #333; scrollbar-width: none;
        }
        #toolbar::-webkit-scrollbar { display: none; }
        .tool-btn {
            flex: 0 0 auto; background: none; border: none; color: #ccc; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; width: 60px; height: 100%; border-radius: 6px; cursor: pointer;
        }
        .tool-btn:active { background: #333; color: #a6e22e; }
        .tool-btn i { font-size: 18px; margin-bottom: 4px; }
        .separator { width: 1px; height: 30px; background: #444; flex: 0 0 auto; margin: 0 2px; }

        /* 通知 */
        .toast {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: #a6e22e; color: #272822; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- タブ -->
        <div id="tabs-container">
            <div id="tabs"></div>
            <button id="btn-new-tab" class="icon-btn"><i class="fas fa-plus"></i></button>
        </div>

        <!-- メイン領域 (エディタ + ミニマップ) -->
        <div id="main-area">
            <div id="editor-wrapper">
                <textarea id="code-editor"></textarea>
            </div>
            <!-- 自作のドラッグ可能ミニマップ -->
            <div id="minimap-track">
                <canvas id="minimap-canvas"></canvas>
                <div id="minimap-slider"></div>
            </div>
        </div>

        <!-- ツールバー -->
        <div id="toolbar">
            <button id="btn-open" class="tool-btn"><i class="fas fa-folder-open"></i> 開く</button>
            <button id="btn-save" class="tool-btn"><i class="fas fa-save"></i> 保存</button>
            <div class="separator"></div>
            <button id="btn-search" class="tool-btn"><i class="fas fa-search"></i> 検索</button>
            <button id="btn-replace" class="tool-btn"><i class="fas fa-exchange-alt"></i> 置換</button>
            <div class="separator"></div>
            <button id="btn-rename" class="tool-btn"><i class="fas fa-pen"></i> 名前変更</button>
            <button id="btn-save-as" class="tool-btn"><i class="fas fa-file-download"></i> DL保存</button>
        </div>
    </div>

    <input type="file" id="file-input" style="display: none;" multiple>
    <div id="toast" class="toast">完了</div>

    <!-- ==========================================
         エディタエンジン読み込み (CodeMirror 5)
         ※確実なCDNから同期読み込み・エラー絶対起きない
         ========================================== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/search.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.js"></script>
    <!-- 言語ハイライト (代表的なもの) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>

    <script>
        let editor;
        let tabs = [];
        let activeTabId = null;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // 初期化処理
        window.onload = function() {
            // ローカルストレージ復元
            const savedData = localStorage.getItem('mobileCodePro_V5');
            if (savedData) {
                try {
                    const state = JSON.parse(savedData);
                    tabs = state.tabs || [];
                    activeTabId = state.activeTabId || null;
                } catch(e) {}
            }
            if (tabs.length === 0) {
                addTab("index.js", "// 画面を長押ししてみてください。\n// スマホ標準の青い選択ピンが出ます！\n\nfunction test() {\n  console.log('Mobile Native Select!');\n}\n\n// 右のミニマップを指で上下に\n// スワイプすると爆速スクロールします");
            }
            if (!activeTabId) activeTabId = tabs[0].id;

            // ★重要: モバイルネイティブ選択をONにする魔法の設定 (inputStyle: "contenteditable")
            editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
                mode: "javascript",
                theme: "monokai",
                lineNumbers: true,           // 行数表示
                lineWrapping: true,          // 画面端で折り返し
                inputStyle: "contenteditable", // スマホの長押し選択を有効化！
                spellcheck: false,
                autocorrect: false
            });

            // 変更時の自動保存 ＆ ミニマップ更新
            let minimapTimeout;
            editor.on('change', () => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) { tab.content = editor.getValue(); saveState(); }
                // タイピングが重くならないよう、少し遅延してミニマップを描画
                clearTimeout(minimapTimeout);
                minimapTimeout = setTimeout(drawMinimap, 300);
            });

            // スクロール時にミニマップのスライダーを同期
            editor.on('scroll', updateMinimapSlider);

            renderTabs();
            loadTabContent(activeTabId);
            
            // 初回ミニマップ描画
            setTimeout(drawMinimap, 100);
        };

        // --- タブ管理 ---
        function addTab(name, content = "") {
            const newId = "t_" + Date.now();
            tabs.push({ id: newId, name: name, content: content });
            activeTabId = newId; saveState();
            if (editor) { renderTabs(); loadTabContent(newId); }
        }

        function loadTabContent(id) {
            const tab = tabs.find(t => t.id === id);
            if (tab && editor) {
                const ext = tab.name.split('.').pop().toLowerCase();
                let mode = "javascript";
                if(ext === 'html') mode = "xml";
                if(ext === 'css') mode = "css";
                editor.setOption("mode", mode);
                if (editor.getValue() !== tab.content) {
                    editor.setValue(tab.content);
                }
                setTimeout(drawMinimap, 50); // タブ切り替え時にミニマップ更新
            }
        }

        function renderTabs() {
            const container = document.getElementById('tabs');
            container.innerHTML = '';
            tabs.forEach(tab => {
                const el = document.createElement('div');
                el.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                el.innerHTML = `<span class="tab-name">${tab.name}</span><span class="tab-close"><i class="fas fa-times"></i></span>`;
                el.querySelector('.tab-name').onclick = () => { activeTabId = tab.id; renderTabs(); loadTabContent(activeTabId); saveState(); };
                el.querySelector('.tab-close').onclick = (e) => {
                    e.stopPropagation();
                    tabs = tabs.filter(t => t.id !== tab.id);
                    if (tabs.length === 0) addTab("untitled.txt", "");
                    else if (activeTabId === tab.id) activeTabId = tabs[tabs.length - 1].id;
                    renderTabs(); loadTabContent(activeTabId); saveState();
                };
                container.appendChild(el);
            });
        }
        function saveState() { localStorage.setItem('mobileCodePro_V5', JSON.stringify({ tabs, activeTabId })); }

        // --- ボタンアクション ---
        document.getElementById('btn-new-tab').onclick = () => { const n = prompt("ファイル名", "new.js"); if(n) addTab(n); };
        document.getElementById('btn-open').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader(); r.onload = (ev) => addTab(f.name, ev.target.result); r.readAsText(f);
            });
            e.target.value = '';
        });
        document.getElementById('btn-save').onclick = () => { saveState(); showToast("保存しました"); };
        document.getElementById('btn-search').onclick = () => editor.execCommand('find');
        document.getElementById('btn-replace').onclick = () => editor.execCommand('replace');
        document.getElementById('btn-rename').onclick = () => {
            const t = tabs.find(x => x.id === activeTabId);
            const n = prompt("新しいファイル名", t.name);
            if(n) { t.name = n; renderTabs(); loadTabContent(activeTabId); saveState(); }
        };
        document.getElementById('btn-save-as').onclick = () => {
            const t = tabs.find(x => x.id === activeTabId);
            const a = document.createElement("a");
            a.href = window.URL.createObjectURL(new Blob([t.content], { type: "text/plain" }));
            a.download = t.name; a.click(); showToast("DL完了");
        };

        // ==========================================
        // ★ 自作: 爆速ドラッグ・ミニマップエンジン
        // ==========================================
        function drawMinimap() {
            if (!editor) return;
            const canvas = document.getElementById('minimap-canvas');
            const track = document.getElementById('minimap-track');
            const ctx = canvas.getContext('2d');
            
            // Canvasの解像度をトラックに合わせる
            canvas.width = track.clientWidth;
            canvas.height = track.clientHeight;
            
            const lines = editor.getValue().split('\n');
            const totalLines = Math.max(lines.length, 1);
            // 画面の高さに全コードを無理やり圧縮して描画（数万行でも一瞬で描画）
            const lineHeight = canvas.height / totalLines;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#66d9ef"; // コードブロックの色
            
            for (let i = 0; i < lines.length; i++) {
                const len = Math.min(lines[i].length, canvas.width * 2); 
                if (len > 0) {
                    const indent = lines[i].search(/\S|$/);
                    // (x, y, width, height)
                    ctx.fillRect(indent * 0.4, i * lineHeight, len * 0.3, Math.max(lineHeight - 0.2, 1));
                }
            }
            updateMinimapSlider();
        }

        function updateMinimapSlider() {
            if (!editor) return;
            const slider = document.getElementById('minimap-slider');
            const track = document.getElementById('minimap-track');
            const info = editor.getScrollInfo();
            
            const heightRatio = info.clientHeight / Math.max(info.height, 1);
            const topRatio = info.top / Math.max(info.height, 1);
            
            slider.style.height = `${heightRatio * track.clientHeight}px`;
            slider.style.top = `${topRatio * track.clientHeight}px`;
        }

        // --- ミニマップのタッチ＆ドラッグで高速スクロール ---
        const track = document.getElementById('minimap-track');
        let isDraggingMinimap = false;

        function handleMinimapDrag(e) {
            e.preventDefault();
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = track.getBoundingClientRect();
            let y = clientY - rect.top;
            y = Math.max(0, Math.min(y, rect.height)); // はみ出し防止
            
            const ratio = y / rect.height;
            const info = editor.getScrollInfo();
            
            // 指の位置が画面の中央になるようにスクロール
            editor.scrollTo(0, (info.height * ratio) - (info.clientHeight / 2));
        }

        // スマホ用タッチイベント
        track.addEventListener('touchstart', (e) => { isDraggingMinimap = true; handleMinimapDrag(e); }, {passive: false});
        track.addEventListener('touchmove', (e) => { if(isDraggingMinimap) handleMinimapDrag(e); }, {passive: false});
        track.addEventListener('touchend', () => { isDraggingMinimap = false; });
        
        // PC用マウスイベント（念のため）
        track.addEventListener('mousedown', (e) => { isDraggingMinimap = true; handleMinimapDrag(e); });
        window.addEventListener('mousemove', (e) => { if(isDraggingMinimap) handleMinimapDrag(e); });
        window.addEventListener('mouseup', () => { isDraggingMinimap = false; });

        // 画面リサイズ時にミニマップを再計算
        window.addEventListener('resize', () => {
            setTimeout(drawMinimap, 100);
        });

    </script>
</body>
</html>
