<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfect Editor Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #1e1e1e;
            --header: #252526;
            --tab-bg: #2d2d2d;
            --accent: #007acc;
            --text: #cccccc;
            --search-bg: #333;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* ヘッダー */
        header {
            background: var(--header); height: 44px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; border-bottom: 1px solid #333; flex-shrink: 0;
        }
        .btn-group { display: flex; gap: 4px; }
        .btn {
            background: #444; color: #fff; border: none; padding: 5px 8px;
            border-radius: 3px; font-size: 11px; cursor: pointer;
        }
        .btn-primary { background: var(--accent); }

        /* 検索バー */
        #search-panel {
            background: var(--search-bg); padding: 8px;
            display: none; flex-direction: column; gap: 5px;
            border-bottom: 1px solid #444;
        }
        .search-row { display: flex; gap: 5px; }
        #search-panel input {
            flex: 1; background: #222; border: 1px solid #555; color: #fff;
            padding: 4px; border-radius: 3px; font-size: 12px;
        }

        /* タブバー */
        #tab-bar {
            display: flex; background: var(--header);
            overflow-x: auto; white-space: nowrap; flex-shrink: 0;
        }
        #tab-bar::-webkit-scrollbar { display: none; }
        .tab {
            padding: 8px 15px; font-size: 12px; background: var(--tab-bg);
            border-right: 1px solid #111; cursor: pointer; display: flex; align-items: center;
        }
        .tab.active { background: var(--bg); border-top: 1px solid var(--accent); }

        /* エディタ */
        #editor-wrapper { flex: 1; position: relative; overflow: hidden; }
        .cm-editor { height: 100%; }

        /* ミニマップ: ドラッグ可能にするための調整 */
        .cm-minimap-gutter { 
            width: 60px !important; 
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="btn-group">
        <button class="btn" onclick="addTab()">+ New</button>
        <button class="btn" onclick="toggleSearch()">Search</button>
        <button class="btn" onclick="selectAllMatches()">Select All</button>
    </div>
    <div class="btn-group">
        <button class="btn btn-primary" onclick="downloadCurrent()">Save</button>
    </div>
</header>

<div id="search-panel">
    <div class="search-row">
        <input type="text" id="find-input" placeholder="Find">
        <button class="btn" onclick="doFindNext()">Next</button>
    </div>
    <div class="search-row">
        <input type="text" id="replace-input" placeholder="Replace with">
        <button class="btn" onclick="doReplace()">Replace</button>
        <button class="btn" onclick="doReplaceAll()">All</button>
    </div>
</div>

<div id="tab-bar"></div>
<div id="editor-wrapper"></div>

<script type="module">
    import { EditorView, basicSetup } from "https://esm.sh/codemirror";
    import { javascript } from "https://esm.sh/@codemirror/lang-javascript";
    import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark";
    import { showMinimap } from "https://esm.sh/@replit/codemirror-minimap";
    import { 
        search, 
        openSearchPanel, 
        findNext, 
        replaceNext, 
        replaceAll, 
        selectMatches 
    } from "https://esm.sh/@codemirror/search";

    let files = JSON.parse(localStorage.getItem('pwa-v3-files')) || [
        { id: 1, name: 'index.js', content: 'function hello() {\n  console.log("Hello World");\n}\n\n// Try Search & Replace!' }
    ];
    let activeId = files[0].id;
    let view;

    const wrapper = document.getElementById('editor-wrapper');
    const tabBar = document.getElementById('tab-bar');

    function initEditor() {
        const file = files.find(f => f.id === activeId);
        if (view) view.destroy();

        view = new EditorView({
            doc: file.content,
            extensions: [
                basicSetup,
                javascript(),
                oneDark,
                search({ top: true }), // 検索機能を有効化
                showMinimap.compute([], () => ({
                    create: () => ({ dom: document.createElement("div") }),
                    showOverlay: "always", // ミニマップの現在位置を強調
                })),
                EditorView.updateListener.of(update => {
                    if (update.docChanged) {
                        file.content = update.state.doc.toString();
                        localStorage.setItem('pwa-v3-files', JSON.stringify(files));
                    }
                })
            ],
            parent: wrapper
        });
    }

    // 検索・置換ロジック
    window.toggleSearch = () => {
        const p = document.getElementById('search-panel');
        p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
    };

    window.doFindNext = () => {
        const query = document.getElementById('find-input').value;
        if (!query) return;
        // CodeMirrorの内部検索状態を更新して次へ
        openSearchPanel(view); 
        const input = document.querySelector('.cm-search-field');
        if(input) {
            input.value = query;
            input.dispatchEvent(new Event('input'));
            findNext(view);
        }
    };

    window.doReplace = () => {
        const repl = document.getElementById('replace-input').value;
        const input = document.querySelector('[name="replace"]');
        if(input) {
            input.value = repl;
            replaceNext(view);
        }
    };

    window.doReplaceAll = () => replaceAll(view);

    // 指定の単語（または選択中単語）を一括選択
    window.selectAllMatches = () => {
        selectMatches(view);
    };

    // タブ・ファイル管理
    window.render = () => {
        tabBar.innerHTML = '';
        files.forEach(f => {
            const t = document.createElement('div');
            t.className = `tab ${f.id === activeId ? 'active' : ''}`;
            t.innerText = f.name;
            t.onclick = () => { activeId = f.id; render(); };
            tabBar.appendChild(t);
        });
        initEditor();
    };

    window.addTab = () => {
        const name = prompt("Filename:", "file.js");
        if (!name) return;
        const id = Date.now();
        files.push({ id, name, content: "" });
        activeId = id;
        render();
    };

    window.downloadCurrent = () => {
        const file = files.find(f => f.id === activeId);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([file.content]));
        a.download = file.name;
        a.click();
    };

    render();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
