<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Tab Editor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #1e1e1e;
            --header: #252526;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --accent: #007acc;
            --text: #cccccc;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* ヘッダーとボタン */
        header {
            background: var(--header); height: 44px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; border-bottom: 1px solid #333;
        }
        .btn-group { display: flex; gap: 5px; }
        .btn {
            background: #444; color: #fff; border: none; padding: 5px 10px;
            border-radius: 3px; font-size: 11px; cursor: pointer;
        }
        .btn-primary { background: var(--accent); }

        /* タブバー（横スクロール可能） */
        #tab-bar {
            display: flex; background: var(--header);
            overflow-x: auto; white-space: nowrap;
            scrollbar-width: none; /* Firefox */
        }
        #tab-bar::-webkit-scrollbar { display: none; } /* Chrome/Safari */
        
        .tab {
            padding: 8px 15px; font-size: 12px; background: var(--tab-bg);
            border-right: 1px solid #111; cursor: pointer; display: flex; align-items: center;
        }
        .tab.active { background: var(--tab-active); color: #fff; border-top: 1px solid var(--accent); }
        .tab-close { margin-left: 8px; font-size: 14px; opacity: 0.5; }

        /* エディタ */
        #editor-wrapper { flex: 1; position: relative; overflow: hidden; }
        .cm-editor { height: 100%; }
        
        /* ミニマップのドラッグ可能エリア強調 */
        .cm-minimap-overlay { background: rgba(255, 255, 255, 0.05) !important; cursor: ns-resize !important; }
    </style>
</head>
<body>

<header>
    <div class="btn-group">
        <button class="btn" onclick="addTab()">+ New</button>
        <label class="btn">Upload<input type="file" id="up" style="display:none"></label>
    </div>
    <div class="btn-group">
        <button class="btn btn-primary" onclick="downloadCurrent()">Download</button>
    </div>
</header>

<div id="tab-bar"></div>
<div id="editor-wrapper"></div>

<script type="module">
    import { EditorView, basicSetup } from "https://esm.sh/codemirror";
    import { javascript } from "https://esm.sh/@codemirror/lang-javascript";
    import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark";
    import { showMinimap } from "https://esm.sh/@replit/codemirror-minimap";

    // 状態管理
    let files = JSON.parse(localStorage.getItem('pwa-files')) || [
        { id: Date.now(), name: 'main.js', content: '// Welcome\nconsole.log("Hello World");' }
    ];
    let activeId = files[0].id;
    let view;

    const tabBar = document.getElementById('tab-bar');
    const wrapper = document.getElementById('editor-wrapper');

    // エディタの初期化/更新
    function initEditor() {
        const file = files.find(f => f.id === activeId);
        if (view) view.destroy();

        view = new EditorView({
            doc: file.content,
            extensions: [
                basicSetup,
                javascript(),
                oneDark,
                showMinimap.compute([], () => ({
                    create: (view) => {
                        const dom = document.createElement("div");
                        return { dom };
                    },
                    showOverlay: "always", // 常にオーバーレイを表示（ドラッグしやすくする）
                })),
                EditorView.updateListener.of(update => {
                    if (update.docChanged) {
                        file.content = update.state.doc.toString();
                        save();
                    }
                })
            ],
            parent: wrapper
        });
    }

    // タブの描画
    function renderTabs() {
        tabBar.innerHTML = '';
        files.forEach(file => {
            const div = document.createElement('div');
            div.className = `tab ${file.id === activeId ? 'active' : ''}`;
            div.innerHTML = `${file.name} <span class="tab-close" data-id="${file.id}">×</span>`;
            div.onclick = () => { activeId = file.id; render(); };
            tabBar.appendChild(div);
        });

        // 閉じるボタンの処理
        document.querySelectorAll('.tab-close').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                if (files.length <= 1) return;
                files = files.filter(f => f.id !== id);
                if (activeId === id) activeId = files[0].id;
                render();
            };
        });
    }

    function save() { localStorage.setItem('pwa-files', JSON.stringify(files)); }
    function render() { renderTabs(); initEditor(); save(); }

    // 公開関数
    window.addTab = () => {
        const name = prompt("File name:", "script.js");
        if (!name) return;
        const newFile = { id: Date.now(), name: name, content: "" };
        files.push(newFile);
        activeId = newFile.id;
        render();
    };

    window.downloadCurrent = () => {
        const file = files.find(f => f.id === activeId);
        const blob = new Blob([file.content], { type: 'text/javascript' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = file.name;
        a.click();
    };

    document.getElementById('up').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        const newFile = { id: Date.now(), name: file.name, content: text };
        files.push(newFile);
        activeId = newFile.id;
        render();
    };

    // 初回起動
    render();

    // PWA登録
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
