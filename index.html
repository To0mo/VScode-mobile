<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e1e1e">
    
    <link rel="manifest" href='data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Mobile%20Code%20Pro%22%2C%22short_name%22%3A%22CodePro%22%2C%22display%22%3A%22standalone%22%2C%22start_url%22%3A%22.%22%2C%22background_color%22%3A%22%231e1e1e%22%2C%22theme_color%22%3A%22%231e1e1e%22%7D'>
    <title>Mobile Code Pro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #272822; color: #f8f8f2; font-family: sans-serif; overflow: hidden; overscroll-behavior-y: none; }
        #app-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

        /* タブ */
        #tabs-container { display: flex; background: #1e1e1e; height: 40px; align-items: center; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #111; }
        #tabs-container::-webkit-scrollbar { display: none; }
        #tabs { display: flex; height: 100%; }
        .tab { padding: 0 15px; height: 100%; display: flex; align-items: center; background: #2d2d2d; border-right: 1px solid #1e1e1e; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .tab.active { background: #272822; color: #a6e22e; border-top: 2px solid #a6e22e; font-weight: bold; }
        .tab-close { margin-left: 10px; font-size: 12px; color: #999; padding: 5px; }
        .icon-btn { background: none; border: none; color: white; padding: 0 15px; height: 100%; cursor: pointer; }

        /* エディタ領域 */
        #main-area { display: flex; flex: 1; overflow: hidden; position: relative; width: 100%; }
        #editor-wrapper { flex: 1; height: 100%; overflow: hidden; }
        .CodeMirror { height: 100%; font-family: 'SF Mono', Consolas, monospace; font-size: 14px; background: #272822; }
        .CodeMirror-dialog { background: rgba(30,30,30,0.95) !important; color: white !important; padding: 10px !important; border-radius: 0 0 8px 8px; }
        .CodeMirror-dialog input { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }

        /* ミニマップ (幅を65pxに拡大) */
        #minimap-track {
            width: 65px; background: #1e1e1e; border-left: 1px solid #333;
            position: relative; overflow: hidden; touch-action: none; cursor: pointer; flex-shrink: 0;
        }
        #minimap-canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #minimap-slider {
            position: absolute; width: 100%; background: rgba(255, 255, 255, 0.12);
            top: 0; left: 0; pointer-events: none; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 2px; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* ツールバー */
        #toolbar {
            height: 55px; background: #1e1e1e; display: flex; align-items: center; padding: 0 5px; overflow-x: auto; gap: 4px; border-top: 1px solid #333; scrollbar-width: none;
        }
        #toolbar::-webkit-scrollbar { display: none; }
        .tool-btn {
            flex: 0 0 auto; background: none; border: none; color: #ccc; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; width: 62px; height: 100%; border-radius: 6px; cursor: pointer;
        }
        .tool-btn:active { background: #333; color: #a6e22e; }
        .tool-btn i { font-size: 18px; margin-bottom: 4px; }
        .separator { width: 1px; height: 30px; background: #444; flex: 0 0 auto; margin: 0 2px; }

        .toast {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: #a6e22e; color: #272822; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); white-space: nowrap;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="tabs-container">
            <div id="tabs"></div>
            <button id="btn-new-tab" class="icon-btn"><i class="fas fa-plus"></i></button>
        </div>

        <div id="main-area">
            <div id="editor-wrapper">
                <textarea id="code-editor"></textarea>
            </div>
            <!-- ミニマップ -->
            <div id="minimap-track">
                <canvas id="minimap-canvas"></canvas>
                <div id="minimap-slider"></div>
            </div>
        </div>

        <div id="toolbar">
            <button id="btn-open" class="tool-btn"><i class="fas fa-folder-open"></i> 開く</button>
            <!-- 上書き保存ボタン -->
            <button id="btn-save" class="tool-btn"><i class="fas fa-save"></i> 上書保存</button>
            <div class="separator"></div>
            <button id="btn-search" class="tool-btn"><i class="fas fa-search"></i> 検索</button>
            <button id="btn-replace" class="tool-btn"><i class="fas fa-exchange-alt"></i> 置換</button>
            <div class="separator"></div>
            <button id="btn-rename" class="tool-btn"><i class="fas fa-pen"></i> 名前変更</button>
            <button id="btn-save-as" class="tool-btn"><i class="fas fa-file-download"></i> DL保存</button>
        </div>
    </div>

    <!-- 非対応ブラウザ用フォールバック -->
    <input type="file" id="file-input" style="display: none;" multiple>
    <div id="toast" class="toast">完了</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/search.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>

    <script>
        // DOM要素のキャッシュ (軽量化)
        const ui = {
            tabs: document.getElementById('tabs'),
            toast: document.getElementById('toast'),
            fileInput: document.getElementById('file-input'),
            canvas: document.getElementById('minimap-canvas'),
            track: document.getElementById('minimap-track'),
            slider: document.getElementById('minimap-slider'),
        };
        const ctx = ui.canvas.getContext('2d', { alpha: false }); // alpha:falseで描画負荷を下げる

        let editor;
        let tabs = [];
        let activeTabId = null;

        function showToast(msg) {
            ui.toast.textContent = msg; 
            ui.toast.classList.add('show');
            setTimeout(() => ui.toast.classList.remove('show'), 2500);
        }

        window.onload = function() {
            const savedData = localStorage.getItem('mobileCodePro_V6');
            if (savedData) {
                try {
                    const state = JSON.parse(savedData);
                    // ファイルハンドルはJSON保存できないため除外される
                    tabs = state.tabs || [];
                    activeTabId = state.activeTabId || null;
                } catch(e) {}
            }
            if (tabs.length === 0) {
                addTab("index.js", "// 上書き保存に対応しました！(一部ブラウザ)\n// ミニマップも潰れず綺麗に表示されます。\n\nfunction superFast() {\n  console.log('Very Fast!');\n}");
            }
            if (!activeTabId) activeTabId = tabs[0].id;

            editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
                mode: "javascript",
                theme: "monokai",
                lineNumbers: true,
                lineWrapping: true,
                inputStyle: "contenteditable", // スマホのネイティブ選択(青ピン)を有効化
                spellcheck: false,
                autocorrect: false,
                viewportMargin: 20 // ★超軽量化: 画面外のコードは描画しない
            });

            let minimapTimeout;
            editor.on('change', () => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) { tab.content = editor.getValue(); saveState(); }
                // タイピング時はデバウンスしてミニマップを描画(軽量化)
                clearTimeout(minimapTimeout);
                minimapTimeout = setTimeout(drawMinimap, 400);
            });

            // スクロール処理をrequestAnimationFrameで極限まで軽くする
            let isScrolling = false;
            editor.on('scroll', () => {
                if (!isScrolling) {
                    window.requestAnimationFrame(() => {
                        updateMinimapSlider();
                        isScrolling = false;
                    });
                    isScrolling = true;
                }
            });

            renderTabs();
            loadTabContent(activeTabId);
            setTimeout(drawMinimap, 100);
        };

        // --- タブ管理 ---
        function addTab(name, content = "", fileHandle = null) {
            const newId = "t_" + Date.now();
            tabs.push({ id: newId, name: name, content: content, fileHandle: fileHandle });
            activeTabId = newId; saveState();
            if (editor) { renderTabs(); loadTabContent(newId); }
        }

        function loadTabContent(id) {
            const tab = tabs.find(t => t.id === id);
            if (tab && editor) {
                const ext = tab.name.split('.').pop().toLowerCase();
                let mode = "javascript";
                if(ext === 'html') mode = "xml";
                if(ext === 'css') mode = "css";
                editor.setOption("mode", mode);
                if (editor.getValue() !== tab.content) editor.setValue(tab.content);
                setTimeout(drawMinimap, 50);
            }
        }

        function renderTabs() {
            ui.tabs.innerHTML = '';
            tabs.forEach(tab => {
                const el = document.createElement('div');
                el.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                // 上書き対象(fileHandleあり)の場合はアイコンを変える
                const icon = tab.fileHandle ? '<i class="fas fa-file-code" style="color:#66d9ef; margin-right:5px;"></i>' : '';
                el.innerHTML = `${icon}<span class="tab-name">${tab.name}</span><span class="tab-close"><i class="fas fa-times"></i></span>`;
                
                el.querySelector('.tab-name').onclick = () => { activeTabId = tab.id; renderTabs(); loadTabContent(activeTabId); saveState(); };
                el.querySelector('.tab-close').onclick = (e) => {
                    e.stopPropagation();
                    tabs = tabs.filter(t => t.id !== tab.id);
                    if (tabs.length === 0) addTab("untitled.txt", "");
                    else if (activeTabId === tab.id) activeTabId = tabs[tabs.length - 1].id;
                    renderTabs(); loadTabContent(activeTabId); saveState();
                };
                ui.tabs.appendChild(el);
            });
        }

        function saveState() {
            // fileHandleはJSON化できないため、名前と中身だけ保存
            const safeTabs = tabs.map(t => ({ id: t.id, name: t.name, content: t.content }));
            localStorage.setItem('mobileCodePro_V6', JSON.stringify({ tabs: safeTabs, activeTabId }));
        }

        // --- ボタンアクション (File System Access API 対応) ---

        // 開く (上書き対応ブラウザなら File System Access API を使う)
        document.getElementById('btn-open').onclick = async () => {
            if (window.showOpenFilePicker) {
                try {
                    const [fileHandle] = await window.showOpenFilePicker();
                    const file = await fileHandle.getFile();
                    const content = await file.text();
                    addTab(file.name, content, fileHandle);
                    showToast("ファイルを開きました (上書き保存可能)");
                    return;
                } catch(e) { /* キャンセル時は何もしない */ }
            } else {
                // 非対応ブラウザ (iOS Safariなど) は従来のinput
                ui.fileInput.click();
            }
        };

        // 従来のフォールバック
        ui.fileInput.addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader(); r.onload = (ev) => addTab(f.name, ev.target.result); r.readAsText(f);
            });
            e.target.value = '';
        });

        // 上書き保存
        document.getElementById('btn-save').onclick = async () => {
            const tab = tabs.find(x => x.id === activeTabId);
            saveState(); // まずブラウザ内に保存

            if (tab.fileHandle && window.showOpenFilePicker) {
                try {
                    // スマホ本体のローカルファイルを直接上書き！
                    const writable = await tab.fileHandle.createWritable();
                    await writable.write(tab.content);
                    await writable.close();
                    showToast("本体のファイルに上書き保存しました！");
                } catch(e) {
                    showToast("上書き失敗 (DL保存を利用してください)");
                }
            } else {
                showToast("ブラウザ内に保存しました (この端末は直接上書き非対応です)");
            }
        };

        // その他機能
        document.getElementById('btn-new-tab').onclick = () => { const n = prompt("ファイル名", "new.js"); if(n) addTab(n); };
        document.getElementById('btn-search').onclick = () => editor.execCommand('find');
        document.getElementById('btn-replace').onclick = () => editor.execCommand('replace');
        document.getElementById('btn-rename').onclick = () => {
            const t = tabs.find(x => x.id === activeTabId);
            const n = prompt("新しいファイル名", t.name);
            if(n) { t.name = n; renderTabs(); loadTabContent(activeTabId); saveState(); }
        };
        // DL保存 (常に新規ファイルとしてダウンロード)
        document.getElementById('btn-save-as').onclick = () => {
            const t = tabs.find(x => x.id === activeTabId);
            const a = document.createElement("a");
            a.href = window.URL.createObjectURL(new Blob([t.content], { type: "text/plain" }));
            a.download = t.name; a.click(); showToast("ダウンロードしました");
        };

        // ==========================================
        // ★ ミニマップ描画エンジン (潰れ防止・超軽量版)
        // ==========================================
        function drawMinimap() {
            if (!editor) return;
            const ch = ui.track.clientHeight;
            const cw = ui.track.clientWidth;
            ui.canvas.width = cw;
            ui.canvas.height = ch;
            
            // 背景をダークに塗りつぶす (alpha:false のため必須)
            ctx.fillStyle = "#1e1e1e";
            ctx.fillRect(0, 0, cw, ch);
            
            const lines = editor.getValue().split('\n');
            const totalLines = Math.max(lines.length, 1);
            const lineHeight = ch / totalLines;
            
            // ★超軽量化アルゴリズム: 
            // コードが長すぎて1行が0.5px未満になる場合、数行を飛ばして描画（処理落ち＆潰れを完璧に防ぐ）
            const step = Math.max(1, Math.floor(1 / lineHeight));
            
            // コードの色（潰れないように少し透過した薄いグレー）
            ctx.fillStyle = "rgba(180, 180, 180, 0.5)"; 
            
            for (let i = 0; i < lines.length; i += step) {
                const line = lines[i];
                const len = line.length;
                if (len === 0) continue;
                
                const indent = line.search(/\S|$/);
                if (indent === len) continue; // 空白行はスキップ
                
                // x座標: インデントに応じて右にずらす, y座標: 画面高さ, w: 文字数, h: 潰れないように最低1pxを確保
                const x = indent * 0.8;
                const y = i * lineHeight;
                const w = Math.min((len - indent) * 0.6, cw - x); // 右端ではみ出さないように
                const h = Math.max(lineHeight * step * 0.8, 1);   // 隙間をあけつつ最低1px
                
                ctx.fillRect(x, y, w, h);
            }
            updateMinimapSlider();
        }

        function updateMinimapSlider() {
            if (!editor) return;
            const info = editor.getScrollInfo();
            const trackH = ui.track.clientHeight;
            
            const heightRatio = info.clientHeight / Math.max(info.height, 1);
            const topRatio = info.top / Math.max(info.height, 1);
            
            ui.slider.style.height = `${heightRatio * trackH}px`;
            ui.slider.style.top = `${topRatio * trackH}px`;
        }

        // --- 爆速ドラッグスクロール ---
        let isDraggingMinimap = false;
        function handleMinimapDrag(e) {
            e.preventDefault();
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = ui.track.getBoundingClientRect();
            const y = Math.max(0, Math.min(clientY - rect.top, rect.height)); 
            
            const ratio = y / rect.height;
            const info = editor.getScrollInfo();
            
            // 指の位置が画面の中央になるようにワープ
            editor.scrollTo(0, (info.height * ratio) - (info.clientHeight / 2));
        }

        ui.track.addEventListener('touchstart', (e) => { isDraggingMinimap = true; handleMinimapDrag(e); }, {passive: false});
        ui.track.addEventListener('touchmove', (e) => { if(isDraggingMinimap) handleMinimapDrag(e); }, {passive: false});
        ui.track.addEventListener('touchend', () => { isDraggingMinimap = false; });
        
        ui.track.addEventListener('mousedown', (e) => { isDraggingMinimap = true; handleMinimapDrag(e); });
        window.addEventListener('mousemove', (e) => { if(isDraggingMinimap) handleMinimapDrag(e); });
        window.addEventListener('mouseup', () => { isDraggingMinimap = false; });

        window.addEventListener('resize', () => { setTimeout(drawMinimap, 100); });
    </script>
</body>
</html>
