<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Code Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- タブバー -->
        <div id="tabs-container">
            <div id="tabs"></div>
            <button id="btn-new-tab" class="icon-btn"><i class="fas fa-plus"></i></button>
        </div>

        <!-- エディタ本体 -->
        <div id="editor-container"></div>

        <!-- 下部ツールバー (横スクロール可能) -->
        <div id="toolbar">
            <button id="btn-open" class="tool-btn"><i class="fas fa-folder-open"></i> 開く</button>
            <button id="btn-save" class="tool-btn"><i class="fas fa-save"></i> 保存</button>
            <div class="separator"></div>
            
            <!-- モバイルコピペ救済ボタン -->
            <button id="btn-select-all" class="tool-btn"><i class="fas fa-object-group"></i> 全選択</button>
            <button id="btn-copy" class="tool-btn"><i class="fas fa-copy"></i> コピー</button>
            <button id="btn-cut" class="tool-btn"><i class="fas fa-cut"></i> カット</button>
            <button id="btn-paste" class="tool-btn"><i class="fas fa-paste"></i> ペースト</button>
            <div class="separator"></div>
            
            <button id="btn-search" class="tool-btn"><i class="fas fa-search"></i> 検索</button>
            <button id="btn-replace" class="tool-btn"><i class="fas fa-exchange-alt"></i> 置換</button>
            <button id="btn-rename" class="tool-btn"><i class="fas fa-pen"></i> 名前変更</button>
            <button id="btn-save-as" class="tool-btn"><i class="fas fa-file-download"></i> DL保存</button>
        </div>
    </div>

    <!-- ファイル選択用 (非表示) -->
    <input type="file" id="file-input" style="display: none;" multiple>
    
    <!-- 通知ポップアップ -->
    <div id="toast" class="toast">処理が完了しました</div>

    <script src="app.js"></script>
</body>
</html>
